# Logan AI — Redis Configuration
# Otimizado para sistemas embarcados (Orange Pi)

# Memória
maxmemory 128mb
maxmemory-policy allkeys-lru

# Persistência (append-only para durabilidade)
appendonly yes
appendfsync everysec

# Streams
stream-node-max-bytes 4096
stream-node-max-entries 100

# Performance
hz 10
tcp-backlog 128
timeout 300

# Logging
loglevel notice
logfile ""

# Desabilita comandos perigosos em produção
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
