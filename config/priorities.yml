  temperature: 10
  fuel: 30
  battery: 20
  rpm: 15
  dtc: 60
  connection: 5
  system: 10
  general: 8
  lambda: 30

# Deduplicação
dedup_window_seconds: 60

# Agrupamento
group_threshold: 3

# Tamanho máximo da fila
max_queue_size: 50
