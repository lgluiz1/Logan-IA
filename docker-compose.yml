# ──────────────────────────────────────────────
# Logan AI — Docker Compose
# ──────────────────────────────────────────────
# Orquestração de todos os serviços do Logan AI.
# Funciona tanto no PC (desenvolvimento) quanto na Orange Pi (produção).

services:

  # ── Redis (Event Bus backbone) ──
  redis:
    image: redis:7-alpine
    container_name: logan_redis
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Supervisor (Core do sistema) ──
  supervisor:
    build:
      context: .
      dockerfile: docker/supervisor/Dockerfile
    container_name: logan_supervisor
    volumes:
      - ./core:/app/core
      - ./drivers:/app/drivers
      - ./workers:/app/workers
      - ./services:/app/services
      - ./config:/app/config
      - ./data:/app/data
      - ./scripts:/app/scripts
      - sqlite_data:/app/db
      - logs_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - LOGAN_ENV=${LOGAN_ENV:-development}
      - DRIVER_NAME=${DRIVER_NAME:-Luiz}
      - LOGAN_LOG_LEVEL=${LOGAN_LOG_LEVEL:-INFO}
      - WHISPER_URL=http://whisper:9000
      - KOKORO_URL=http://kokoro:8880
    restart: unless-stopped

  # ── API REST (FastAPI) ──
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: logan_api
    ports:
      - "8080:8080"
    volumes:
      - ./api:/app/api
      - ./core:/app/core
      - ./services:/app/services
      - sqlite_data:/app/db
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - LOGAN_ENV=${LOGAN_ENV:-development}
    restart: unless-stopped

  # ── Whisper STT ──
  whisper:
    build:
      context: ./docker/whisper
      dockerfile: Dockerfile
    container_name: logan_whisper
    ports:
      - "9000:9000"
    volumes:
      - whisper_models:/root/.cache
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - WHISPER_LANGUAGE=pt
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Kokoro TTS ──
  kokoro:
    build:
      context: ./docker/kokoro
      dockerfile: Dockerfile
    container_name: logan_kokoro
    ports:
      - "8880:8880"
    volumes:
      - kokoro_models:/app/models
      - kokoro_cache:/app/cache
    environment:
      - KOKORO_VOICE=${KOKORO_VOICE:-af_sarah}
      - HF_HOME=/app/cache
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Prometheus (Métricas) ──
  prometheus:
    image: prom/prometheus:latest
    container_name: logan_prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Grafana (Dashboard) ──
  grafana:
    image: grafana/grafana:latest
    container_name: logan_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-logan2024}
    restart: unless-stopped

volumes:
  redis_data:
  sqlite_data:
  logs_data:
  whisper_models:
  kokoro_models:
  kokoro_cache:
  prometheus_data:
  grafana_data:
